---

name: Molecule
on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
    paths-ignore:
      - '**/*.md'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v7

      - name: Set up Python 3.
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install test dependencies.
        run: pip3 install yamllint

      - name: Lint code.
        run: |
          yamllint .

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - almalinux8
          - almalinux9
          - almalinux10
          - debian12
          - debian13
          - fedora42
          - fedora43
          - fedora44
          - rockylinux8
          - rockylinux9
          - rockylinux10
          - ubuntu2204
          - ubuntu2404
        include:
          # EL8 legs ship a managed-node Python 3.6.8, below ansible-core's
          # floor. Pin them to ansible-core 2.16.x and controller Python
          # 3.12 (ansible-compat refuses ansible-core < 2.20 on controller
          # Python >= 3.14). Every other distro uses latest ansible for
          # dnf5/libdnf5 support (e.g. Fedora 42+).
          - distro: almalinux8
            ansible_pin: "ansible<10"
            python_version: '3.12'
          - distro: rockylinux8
            ansible_pin: "ansible<10"
            python_version: '3.12'

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v7

      - name: Set up Python 3.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version || '3.12' }}

      - name: Install test dependencies.
        run: pip3 install "${{ matrix.ansible_pin || 'ansible' }}" molecule molecule-plugins[docker] docker cryptography

      - name: Create vault_password
        run: |
          echo ${{ secrets.ANSIBLE_VAULT_PASSWORD }} > ~/.vault-password

      - name: Run Molecule tests.
        run: molecule test
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
          ANSIBLE_VAULT_PASSWORD_FILE: ~/.vault-password

      - name: Remove vault_password
        if: always()
        run: |
          rm -f ~/.vault-password

  release:
    name: Release
    runs-on: ubuntu-latest
    environment: galaxy
    needs:
      - lint
      - molecule
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v7
        with:
          submodules: true
          fetch-depth: 0

      - name: Release on galaxy
        uses: ansible-actions/ansible-galaxy-action@v1.2.0
        with:
          galaxy_api_key: ${{ secrets.GALAXY_API_KEY }}
